services:
  app:
    volumes:
      - uploads_data:/app/public/uploads
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://lighterpack:lighterpack@db:5432/lighterpack?schema=public
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=lighterpack
      - POSTGRES_PASSWORD=lighterpack
      - POSTGRES_DB=lighterpack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighterpack"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data: